name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a new push doesn't queue behind stale CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Retry transient crates.io download drops (e.g. the Windows schannel
  # "server closed abruptly (missing close_notify)" mid-transfer) instead of
  # failing the job outright. Default is 3.
  CARGO_NET_RETRY: "10"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

  # Fail fast if the committed Cargo.lock is out of sync with the manifests. The
  # release workflow packages and publishes with `--locked`, so a stale lock (a
  # manifest edit not reflected in the lock) would only surface AT release time,
  # after the version bump/commit — this catches it on every push/PR instead.
  # `cargo metadata --locked` resolves against the committed lock and errors if
  # it would need updating, without a full build.
  lockfile:
    name: Cargo.lock in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo metadata --format-version 1 --locked > /dev/null

  # Unit-test the pure release DECISIONS (version math, dependency graph +
  # publish order, the `cargo package` verify set, and the SemVer bump
  # comparison) that scripts/release/lib.sh feeds the release workflow. Runs the
  # same fixtures `scripts/gate` runs locally. A wrong decision here (a
  # semver-breaking patch, a crate packaged out of dependency order) would only
  # bite at release time against the irreversible crates.io upload, so it's
  # gated on every push/PR. `test_manifest_deps_match` also pins the dependency
  # map to the real Cargo.toml manifests so it can't silently rot.
  release-lib:
    name: release lib fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: bash scripts/release/lib.test.sh

  clippy:
    name: clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows-only cfg branches must be linted, not merely compiled by the
        # test lane; otherwise warnings hidden from Ubuntu can block local gates.
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo clippy --all-targets --locked -- -D warnings
      # Lint every optional feature too: `mock` (mockall + generated mocks) and
      # `tracing` (the per-command observability events).
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  # Build the rustdoc the way docs.rs will, and keep it from rotting. `-D warnings`
  # turns a broken intra-doc link — which doctests do NOT catch but which silently
  # degrades the docs.rs page — into a failure. Three builds: the docs.rs config
  # (every feature, so the optional surfaces show), the lean no-default config, and
  # a nightly `--cfg docsrs` build that exercises the `doc(cfg(...))` feature badges
  # (doc_cfg is nightly-only; docs.rs builds on nightly). The doctest run keeps the
  # embedded guide/example code compiling against the public API.
  doc:
    name: rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo doc --no-deps --workspace --all-features
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo doc --no-deps --workspace --no-default-features
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo test --doc --workspace --all-features
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo +nightly doc --no-deps --workspace --all-features
        env:
          RUSTDOCFLAGS: --cfg docsrs -D warnings

  # Enforce the documented MSRV so the "machine-checked" claim is real. Pin the
  # FULL 1.88.0 (not the `1.88` channel alias) so the floor can't silently drift.
  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      # libs + bins only, deliberately NOT --all-targets: the MSRV contract is for
      # consumers compiling the LIBRARIES, not our tests/benches/examples (which may
      # use newer toolchain features). --all-features covers `mock` and `tracing`.
      # `--locked` asserts the MSRV floor is checked against the committed
      # Cargo.lock (the versions consumers actually resolve), not a silently
      # updated graph.
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo check --workspace --all-features --locked

  # Check every optional feature compiles SOLO on the crate that declares it. The
  # `clippy`/`test`/`msrv` jobs all build `--all-features` (every feature ON at
  # once) and the default build (every optional feature OFF) — neither catches a
  # feature that's broken *in isolation* (a missing dep, or a `#[cfg(feature)]`
  # block that only compiles because some OTHER feature happened to pull the
  # symbol in). This job pins exactly that gap.
  features:
    name: feature isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Check each optional feature in isolation
        # Data-driven: one `<crate> <feature>` pair per line. Adding a pair is a
        # one-line change here.
        run: |
          set -euo pipefail
          pairs="
          vcs-git mock
          vcs-jj mock
          vcs-github mock
          vcs-gitlab mock
          vcs-gitea mock
          vcs-git tracing
          vcs-jj tracing
          vcs-github tracing
          vcs-gitlab tracing
          vcs-gitea tracing
          vcs-core tracing
          vcs-forge tracing
          vcs-watch tracing
          vcs-watch stream
          vcs-diff serde
          vcs-core serde
          vcs-forge serde
          "
          echo "$pairs" | while read -r crate feature; do
            [ -z "$crate" ] && continue
            echo "::group::cargo check -p $crate --features $feature"
            cargo check -p "$crate" --features "$feature"
            echo "::endgroup::"
          done

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS exercises processkit's no-containment (best-effort) path.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - run: cargo build --all-targets
      - run: cargo test
      # Exercise every optional feature: the mock layer (automock + ScriptedRunner)
      # and the `tracing` per-command events.
      - run: cargo test --workspace --all-features

  # Compile Criterion benchmarks, but never run timing measurements on noisy shared
  # runners. This is an ordinary required `run` step: a non-zero cargo exit code
  # fails the job, so stale benchmark APIs or manifests cannot silently drift.
  benchmarks:
    name: benchmark compilation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Compile Criterion benchmarks
        run: cargo bench --no-run --locked

  # Run the real-binary integration suites (`--ignored`) against multiple jj
  # versions — jj's CLI/revset/template surface churns fast and the parsers are
  # validated empirically, so this catches drift (a new jj that changes output)
  # before users hit it. The hermetic `test` job above already covers the 3 OSes
  # on runner-default versions; this is Linux-only to keep the matrix cheap.
  integration:
    name: integration (jj ${{ matrix.jj }}${{ matrix.os == 'ubuntu-22.04' && ', old git' || '' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Combinations spelled out explicitly (an `include` with a key that matches
      # a base-axis value would MERGE into that combination rather than add a job).
      # Floor / mid / latest jj on ubuntu-latest, plus one cheap older-git data
      # point: the floor jj on ubuntu-22.04 (its git is older, no install step).
      matrix:
        include:
          - { jj: "0.38.0", os: ubuntu-latest }
          - { jj: "0.40.0", os: ubuntu-latest }
          - { jj: "0.42.0", os: ubuntu-latest }
          - { jj: "0.38.0", os: ubuntu-22.04 }
    env:
      # Let the read-only gh integration tests (run/release reads against this
      # repo) run too; the rest skip gracefully when unauthenticated.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Install jj ${{ matrix.jj }}
        # jj has no install-action entry and cargo-binstall ignores the pinned
        # version, so download the release tarball and drop the binary on PATH.
        run: |
          gh release download "v${{ matrix.jj }}" --repo jj-vcs/jj \
            --pattern '*x86_64-unknown-linux-musl.tar.gz' --output jj.tar.gz
          mkdir -p "$HOME/.local/bin"
          # The tarball holds `./jj` at the root; extract it all (tiny) and put
          # the binary on PATH.
          tar -xzf jj.tar.gz -C "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/jj"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: jj --version
      - run: git --version
      # Install the forge CLIs so the vcs-gitlab/vcs-gitea integration smoke tests
      # run for real. Best-effort: the tests skip gracefully when a binary is
      # absent, so a download hiccup doesn't fail the build.
      - name: Install glab + tea (best-effort)
        continue-on-error: true
        run: |
          # No `set -e`: glab and tea install independently, and a hiccup in one
          # (or in the version-resolve curl) must not skip the other. The smoke
          # tests skip gracefully when a binary is absent.
          set -uo pipefail
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # glab: resolve the latest release and grab its linux-amd64 tarball
          # (the release "downloads" permalink carries the asset by name).
          glab_ver="$(curl -fsSL 'https://gitlab.com/api/v4/projects/gitlab-org%2Fcli/releases?per_page=1' \
            | grep -oP '"tag_name":"v\K[^"]+' | head -1)" || true
          if [ -n "${glab_ver:-}" ] \
            && curl -fsSL "https://gitlab.com/gitlab-org/cli/-/releases/v${glab_ver}/downloads/glab_${glab_ver}_linux_amd64.tar.gz" -o glab.tar.gz; then
            tar -xzf glab.tar.gz -C "$HOME/.local/bin" --strip-components=1 "bin/glab" && chmod +x "$HOME/.local/bin/glab"
          fi
          # tea: a single static binary published under dl.gitea.com.
          tea_ver="$(curl -fsSL 'https://gitea.com/api/v1/repos/gitea/tea/releases?limit=1' \
            | grep -oP '"tag_name":"v?\K[^"]+' | head -1)" || true
          if [ -n "${tea_ver:-}" ] \
            && curl -fsSL "https://dl.gitea.com/tea/${tea_ver}/tea-${tea_ver}-linux-amd64" -o "$HOME/.local/bin/tea"; then
            chmod +x "$HOME/.local/bin/tea"
          fi
      - run: glab --version || echo "glab not installed (tests will skip)"
      - run: tea --version || echo "tea not installed (tests will skip)"
      # The integration suites are `#[ignore]`d (need the real binaries); run them.
      # `--tests` scopes this to unit + integration test targets and EXCLUDES
      # doctests: `-- --ignored` would otherwise compile every `ignore`-marked guide
      # fence (deliberately illustrative, not compiled — see the `doc` job, which
      # owns doctest health via `cargo test --doc`).
      - run: cargo test --workspace --all-features --tests -- --ignored

  # Same real-binary suites as `integration`, but on Windows: several branches
  # are Windows-only or Windows-empirically-validated (`\`-normalization in
  # JjFileset::path, separator normalization in show_file/file_show, hook
  # suppression via `core.hooksPath`, Job Object containment) and until now were
  # only exercised against the mock/scripted runner on the `test` job's Windows
  # lane. Runner-default git (no explicit install) plus a single pinned jj
  # version — this is a confirmation lane, not a version-drift matrix like
  # `integration`, so it doesn't need multiple jj versions or OSes.
  integration-windows:
    name: integration (windows, jj 0.42.0)
    runs-on: windows-latest
    env:
      # Let the read-only gh integration tests (run/release reads against this
      # repo) run too; the rest skip gracefully when unauthenticated.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Install jj 0.42.0
        # jj has no install-action entry and cargo-binstall ignores the pinned
        # version, so download the release archive and drop the binary on PATH.
        # Unlike the Linux `*x86_64-unknown-linux-musl.tar.gz` asset, the Windows
        # asset is a `.zip` (`jj-vX.Y.Z-x86_64-pc-windows-msvc.zip`, containing
        # `jj.exe` at its root), so it's unpacked with Expand-Archive, not tar.
        run: |
          gh release download "v0.42.0" --repo jj-vcs/jj `
            --pattern '*x86_64-pc-windows*' --output jj.zip
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.local\bin" | Out-Null
          Expand-Archive -Path jj.zip -DestinationPath "$env:USERPROFILE\.local\bin" -Force
          echo "$env:USERPROFILE\.local\bin" >> $env:GITHUB_PATH
      - run: jj --version
      - run: git --version
      # The integration suites are `#[ignore]`d (need the real binaries); run them.
      # `--tests` scopes this to unit + integration test targets and EXCLUDES
      # doctests (see the `doc` job, which owns doctest health via `cargo test
      # --doc`).
      - run: cargo test --workspace --all-features --tests -- --ignored

  # Documentation rot that no other job exercises: dead relative links between
  # CLAUDE.md/README/`docs/**`/per-crate guides/CHANGELOGs (the guides are also
  # embedded into rustdoc via `include_str!` and published as-is to docs.rs,
  # see the `doc` job above, so a link that only "works" when browsed on
  # GitHub is still a real defect there) via `lychee`, typos in that same prose
  # via `typos`, and drift between `crates/core/docs/stability.md`'s version
  # matrix and the crates' actual manifests via `scripts/docs-health`. Neither
  # `typos` nor `lychee` has an install-action entry, so both are grabbed from
  # their GitHub release tarballs (same pattern as `jj`/`glab`/`tea` in the
  # `integration` job).
  docs-health:
    name: docs-health (links + spelling)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install typos + lychee
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -fsSL -o typos.tar.gz "https://github.com/crate-ci/typos/releases/download/v1.48.0/typos-v1.48.0-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf typos.tar.gz -C "$HOME/.local/bin" ./typos
          curl -fsSL -o lychee.tar.gz "https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.2/lychee-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf lychee.tar.gz -C "$HOME/.local/bin" --strip-components=1 lychee-x86_64-unknown-linux-gnu/lychee
          chmod +x "$HOME/.local/bin/typos" "$HOME/.local/bin/lychee"
      # Spelling: config in `_typos.toml` at the repo root (domain vocabulary —
      # jj, revset(s), fileset(s), gitea, argv, and the underlying git/GitHub
      # crates — so real terms aren't flagged as typos).
      #
      # Both steps below check the same documentation surface: CLAUDE.md,
      # README, CONTRIBUTING, `docs/**`, every per-crate guide
      # (`crates/*/docs/*.md`) and CHANGELOG, plus `ideas/**`/`decisions/**` if
      # present (neither exists in this repo yet, so they're included
      # conditionally rather than failing the glob). Deliberately excludes
      # source code and per-crate READMEs (crates.io landing pages, not part
      # of the linked guide network `include_str!` embeds into rustdoc).
      - name: typos (spelling)
        run: |
          set -euo pipefail
          shopt -s nullglob
          targets=(CLAUDE.md README.md CONTRIBUTING.md docs crates/*/docs/*.md crates/*/CHANGELOG.md)
          for extra in ideas decisions; do
            [ -d "$extra" ] && targets+=("$extra")
          done
          typos "${targets[@]}"
      # Links: relative Markdown links must resolve to real files, external
      # URLs must be live. Config in `lychee.toml` at the repo root (see its
      # header for the GITHUB_TOKEN-vs-excluding-github.com rationale — most
      # links here ARE github.com, e.g. every CHANGELOG's `.../compare/...`).
      - name: lychee (link check)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          targets=(CLAUDE.md README.md CONTRIBUTING.md docs crates/*/docs/*.md crates/*/CHANGELOG.md)
          for extra in ideas decisions; do
            [ -d "$extra" ] && targets+=("$extra")
          done
          lychee --config lychee.toml "${targets[@]}"
      # Version-matrix drift: the stability tiers table in
      # `crates/core/docs/stability.md` is hand-maintained and must track the
      # real `version = "..."` in every crate's `Cargo.toml` (and vice versa).
      # No new tool needed — pure bash, see `scripts/docs-health.sh`.
      - name: docs-health (version matrix)
        run: scripts/docs-health

  audit:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Scan the dependency tree for security advisories and banned/duplicate crates.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans

  package:
    name: cargo package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      # Only crates with no *unpublished* workspace dependency can be packaged here:
      # vcs-diff (no deps), vcs-cli-support (only the published `processkit`), and
      # vcs-testkit (no deps). They package and verify-build fully — catching missing
      # files or bad metadata before publish. `--locked` asserts the packaged build
      # resolves against the committed Cargo.lock (the same guarantee the release
      # workflow's package/publish steps rely on), so a stale lock is caught here.
      - run: cargo package -p vcs-diff -p vcs-cli-support -p vcs-testkit --locked
      # vcs-git/vcs-jj/vcs-github/vcs-core depend (by version) on in-workspace crates
      # not yet on crates.io — vcs-diff/vcs-cli-support, and vcs-core also on
      # vcs-git/vcs-jj. `cargo package` (even `--no-verify`) refuses to prepare a
      # crate whose deps it can't resolve for upload, so they can't be packaged until
      # those deps publish. Their compile is covered by the `test`/`clippy` jobs
      # (against the local path deps), and the release workflow verify-builds each
      # against the local tree (or the published deps) at release time.

  package-license:
    name: packaged MIT licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      # `license-file = "LICENSE"` makes Cargo include each crate-local
      # LICENSE in the package. Check every publishable crate explicitly: the
      # local file must remain byte-identical to the root MIT text, and Cargo's
      # final package list must contain it.
      - name: Verify every published package carries the root MIT license
        shell: bash
        run: |
          set -euo pipefail
          crates=(
            vcs-cli-support vcs-core vcs-diff vcs-forge vcs-git vcs-gitea
            vcs-github vcs-gitlab vcs-jj vcs-mcp vcs-testkit vcs-watch
          )
          for crate in "${crates[@]}"; do
            dir="crates/${crate#vcs-}"
            cmp --silent LICENSE "$dir/LICENSE"
            cargo package --list -p "$crate" --locked | grep -qx 'LICENSE'
          done

  # Snapshot-gate the public API surface of every published crate. Each crate
  # carries a committed `crates/<crate>/public-api.txt` baseline; this job
  # regenerates the ACTUAL exported surface and diffs it against that baseline,
  # failing (and printing the unified diff) on any drift — a new trait method, a
  # new error variant, a new DTO field, a changed signature, or a changed
  # auto-trait (`Send`/`Sync`) impl. That turns the public-API review in
  # crates/core/docs/stability.md from a manual reading into a MECHANICAL gate:
  # the reviewer sees exactly what moved and cross-checks only that. Updating a
  # baseline is a deliberate act (see CONTRIBUTING.md, "Updating a public-API
  # snapshot") — a stale baseline fails here instead of drifting silently.
  #
  # cargo-public-api reads rustdoc JSON, which is nightly-only, so this job pins a
  # DATED nightly SOLELY for the snapshot tool; it does NOT touch the 1.88 MSRV
  # the other jobs enforce. The nightly is pinned (not a floating `@nightly`) so
  # the type/auto-trait rendering is reproducible and a routine nightly bump can't
  # spuriously fail the gate — keep it in lockstep with the toolchain
  # CONTRIBUTING.md documents for regenerating the baselines. Runs on
  # windows-latest because a few public items are cfg-gated per-OS (e.g.
  # `vcs-testkit::non_utf8_filename` is `#[cfg(unix)]`), so the committed
  # baselines are Windows-shaped and the checking OS must match the generating one.
  public-api:
    name: public-api snapshot
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-25
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      # Prebuilt, version-pinned binary (the same install-action the coverage job
      # uses) so the rendering matches what generated the committed baselines.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api@0.52.0
      - name: Diff each published crate's public API against its snapshot
        shell: bash
        run: |
          set -uo pipefail
          # One `<crate-dir> <package-name>` pair per line (mirrors the workspace
          # members). Adding a published crate is a one-line change here plus a
          # committed crates/<dir>/public-api.txt.
          pairs="
          diff vcs-diff
          cli-support vcs-cli-support
          git vcs-git
          jj vcs-jj
          github vcs-github
          gitlab vcs-gitlab
          gitea vcs-gitea
          forge vcs-forge
          core vcs-core
          testkit vcs-testkit
          watch vcs-watch
          mcp vcs-mcp
          "
          # Check EVERY crate before failing, so a single run surfaces all drift.
          failed=""
          while read -r dir name; do
            [ -z "$dir" ] && continue
            baseline="crates/$dir/public-api.txt"
            echo "::group::public-api diff — $name"
            if [ ! -f "$baseline" ]; then
              echo "::error::missing snapshot $baseline (generate it — see CONTRIBUTING.md)"
              failed="$failed $name"
              echo "::endgroup::"
              continue
            fi
            # `--simplified` (omit blanket impls) + `--all-features` (mock/serde/
            # tracing surfaces) must match how the baselines were generated. stdin
            # is detached so the here-string driving the loop can't be consumed.
            if ! cargo +nightly-2026-06-25 public-api -p "$name" --simplified --all-features \
                 < /dev/null > "current-api-$name.txt"; then
              echo "::error::cargo public-api failed for $name (see the log above)"
              failed="$failed $name"
              echo "::endgroup::"
              continue
            fi
            if diff -u "$baseline" "current-api-$name.txt"; then
              echo "(no changes)"
            else
              echo "::error::public API of $name drifted from $baseline — if intended, regenerate the snapshot (see CONTRIBUTING.md)"
              failed="$failed $name"
            fi
            echo "::endgroup::"
          done <<< "$pairs"
          if [ -n "$failed" ]; then
            echo "public-API snapshot mismatch:$failed"
            exit 1
          fi

  # Report-only SemVer check (cargo-semver-checks). Every crate is 0.x and may break
  # its API freely pre-1.0, so this must NOT gate — `continue-on-error: true` keeps it
  # advisory: it surfaces accidental breaking changes against each crate's crates.io
  # baseline for awareness now, and becomes the enforcing gate as crates approach 1.0
  # (pairs with the pre-1.0 public-API review in crates/core/docs/stability.md). Crates
  # with no published baseline are skipped by the action.
  semver:
    name: semver-checks (report-only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: obi1kenobi/cargo-semver-checks-action@v2

  # Report-only coverage (cargo-llvm-cov). No crate has a coverage floor and
  # this must NOT gate — `continue-on-error: true` keeps it advisory, the same
  # posture as `semver` above: it makes the coverage trend and per-file gaps
  # (e.g. in vcs-core's backend dispatchers or the MCP tools) visible without
  # blocking the pipeline, so gaps can be targeted deliberately instead of
  # guessed at.
  coverage:
    name: coverage (report-only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --all-features --html
      - name: Add coverage summary to job summary
        run: |
          {
            echo "### Coverage summary"
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: target/llvm-cov/html
          if-no-files-found: warn
