name: Release

# Manual release workflow. Needs the `CRATES_IO_TOKEN` repository secret.
#
# `workflow_dispatch`-only (no push/tag trigger), so it never runs on its own:
# click "Run workflow", pick which crate (or `all`) and a bump type. The version
# is never typed by hand — pick patch/minor/major and each crate's `Cargo.toml`
# (the source of truth) is bumped, committed back, tagged `<crate>-v<version>`,
# and published, so the manifest, the tag, and the GitHub Release never drift.
# A crate's first release (no `<crate>-v*` tag yet) ships its current `Cargo.toml`
# version as-is, ignoring the bump.
#
# Each crate is versioned and published independently (see CONTRIBUTING.md
# "Releasing"). Two foundational crates publish FIRST — `vcs-diff` (std-only diff
# model) and `vcs-cli-support` (the processkit-coupled plumbing) — since the
# wrappers depend on them. The wrappers (vcs-git/vcs-jj/vcs-github/vcs-gitlab/
# vcs-gitea) then publish, then the facades — `vcs-forge` (depends on the
# github/gitlab/gitea wrappers) and `vcs-core` (depends on vcs-git/vcs-jj) —
# and finally `vcs-watch`/`vcs-mcp` (depend on `vcs-core`/`vcs-core`+`vcs-forge`);
# `vcs-testkit` has no workspace deps and can publish at any point.
# `scripts/release/lib.sh` is the source of truth for this order. Each
# `^MAJOR.MINOR` intra-workspace dependency must stay in range when a dep
# crosses a minor/major boundary. `all` releases every crate in one run — each
# bumped by the same chosen type, from its own current version — in a single
# commit + atomic push, then published and tagged one by one.
#
# Per crate: bump → auto-fill an empty `[Unreleased]` from git history (git-cliff,
# scoped to the crate's directory) → promote the changelog. Then, once for the
# whole batch and BEFORE any upload: a SemVer gate (reject a bump too small for
# the API change) and a `cargo package` verify (build each crate from its real
# packaged tarball, resolving in-run deps from a temporary registry). Only then,
# per crate → publish to crates.io → tag → GitHub Release. Publishing comes BEFORE
# the tag, so a failed publish strands nothing (just re-run; an already-uploaded
# version is treated as success).

on:
  # Manual trigger only. The "Run workflow" button shows on this workflow's own
  # page (Actions → Release, top-right) — GitHub renders it only because this
  # file, carrying `workflow_dispatch`, lives on the default branch.
  workflow_dispatch:
    inputs:
      crate:
        description: Crate(s) to release
        required: true
        type: choice
        options:
          - all
          - vcs-diff
          - vcs-cli-support
          - vcs-git
          - vcs-jj
          - vcs-github
          - vcs-gitlab
          - vcs-gitea
          - vcs-forge
          - vcs-testkit
          - vcs-core
          - vcs-watch
          - vcs-mcp
        default: all
      bump:
        description: Version bump type (ignored on a crate's first release)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

# Never run two releases at once — they both bump + commit to the branch.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the version-bump commit + tags, and create the Releases

env:
  # Retry transient crates.io download drops (curl/schannel) so a release isn't
  # tripped by a flaky fetch in the dry-run gate. Default is 3.
  CARGO_NET_RETRY: "10"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags, for version math and git-cliff

      # Nightly is installed FIRST and stable LAST so stable stays the DEFAULT
      # toolchain for every build/package/publish step (dtolnay/rust-toolchain
      # makes the last-installed toolchain the default). Nightly exists only for
      # the SemVer gate's `cargo-semver-checks`, whose rustdoc-JSON generation is
      # nightly-only, and is reached explicitly via `cargo +nightly-2026-06-15`
      # there. PINNED (not the floating `nightly` channel): rustc's *unstable*
      # rustdoc-JSON format version keeps moving forward on nightly, and
      # cargo-semver-checks only understands the format versions current at its
      # own release time — a newer nightly than the checker supports fails with
      # "unsupported rustdoc format vNN" for EVERY crate, which the SemVer gate
      # (correctly) treats as "no verdict, refuse to release blind" (see below).
      # cargo-semver-checks v0.48.0 (the version at the time of this pin)
      # understands format v56/v57; v57 held from at least 2026-06-01 through
      # 2026-06-15 and had already moved to v58 by 2026-06-25 (empirically
      # bisected). When bumping this pin, re-verify locally first: `cargo
      # +nightly-<date> rustdoc -Z unstable-options --output-format json -p
      # <any small crate>` and check the `format_version` field of the emitted
      # `target/doc/<crate>.json` is one cargo-semver-checks' CURRENT release
      # actually lists as supported (its error message names the supported set).
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
      - uses: dtolnay/rust-toolchain@stable

      # Fail fast if the publish credential is missing, BEFORE any irreversible
      # step (tag/push/Release). Otherwise a missing secret would only surface at
      # the final `cargo publish`, stranding a tag + Release with no crates.io
      # version.
      - name: Preflight — require CRATES_IO_TOKEN
        env:
          TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::error::CRATES_IO_TOKEN secret is not set. Add it under repo Settings → Secrets and variables → Actions before releasing."
            exit 1
          fi

      - name: Install tooling
        run: cargo install cargo-edit --locked

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2

      # The SemVer gate's checker (see the "SemVer gate" step). A standalone
      # prebuilt binary; it shells out to the toolchain chosen at call time, so
      # `cargo +nightly-2026-06-15 semver-checks` runs it under the pinned
      # nightly above for rustdoc JSON.
      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      # Resolve the selected crate(s) and compute each one's next version from its
      # own Cargo.toml — never typed by hand. Writes a plan to $RUNNER_TEMP/plan.tsv
      # with one `name<TAB>dir<TAB>version<TAB>prev_tag` line per crate. `bump` is a
      # fixed choice (not free-form), so interpolating it is not an injection risk.
      # The crate directory map, publish order, and version math all come from
      # scripts/release/lib.sh — the single source of truth the release unit tests
      # (scripts/release/lib.test.sh) also exercise.
      - name: Plan releases (version math)
        shell: bash
        env:
          SELECTED: ${{ inputs.crate }}
          BUMP: ${{ inputs.bump }}
          PLAN: ${{ runner.temp }}/plan.tsv
        run: |
          set -euo pipefail
          source scripts/release/lib.sh
          # `all` releases every crate in dependency (publish) order; otherwise the
          # single selected crate.
          if [ "$SELECTED" = "all" ]; then
            NAMES="$(release_order)"
          else
            NAMES="$SELECTED"
          fi
          : > "$PLAN"
          summary=""
          for name in $NAMES; do
            dir="$(crate_dir "$name")"
            current=$(grep -m1 -oP '(?<=^version = ")[^"]+' "$dir/Cargo.toml")
            if ! is_semver "$current"; then
              echo "::error::Could not parse version from $dir/Cargo.toml (got '$current')"
              exit 1
            fi
            if git tag --list "${name}-v*" | grep -q .; then
              new="$(next_version "$current" "$BUMP")"
              prev="${name}-v${current}"
            else
              new="$current"   # first release: ship the current version as-is
              prev=""
            fi
            if git rev-parse "${name}-v${new}" >/dev/null 2>&1; then
              echo "::error::Tag ${name}-v${new} already exists"
              exit 1
            fi
            printf '%s\t%s\t%s\t%s\n' "$name" "$dir" "$new" "$prev" >> "$PLAN"
            summary="${summary}${name} v${new} (prev: ${prev:-none}); "
          done
          echo "Release plan: ${summary}"

      # Bump every planned crate's manifest (no-op for a first release already at
      # its current version). `cargo set-version` also updates Cargo.lock.
      - name: Bump versions
        shell: bash
        env:
          PLAN: ${{ runner.temp }}/plan.tsv
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r name dir version prev; do
            cur=$(grep -m1 -oP '(?<=^version = ")[^"]+' "$dir/Cargo.toml")
            if [ "$cur" = "$version" ]; then
              echo "$name already at $version (first release) — no bump"
            else
              echo "set-version $name: $cur -> $version"
              cargo set-version -p "$name" "$version"
            fi
          done < "$PLAN"

      # For each planned crate: auto-fill an empty `[Unreleased]` from git-cliff
      # (scoped to the crate's directory), extract its release notes to
      # $RUNNER_TEMP/<name>-notes.md, and promote `[Unreleased]` to the new version.
      # Manual bullets always win; auto-fill only runs when [Unreleased] has none.
      - name: Update changelogs
        shell: bash
        env:
          PLAN: ${{ runner.temp }}/plan.tsv
          NOTES_DIR: ${{ runner.temp }}
          REPO: ${{ github.server_url }}/${{ github.repository }}
          # Force UTF-8 for all file I/O — changelog/notes contain non-ASCII
          # (em dashes, arrows, emoji) and must not depend on the runner locale.
          PYTHONUTF8: "1"
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import re
          import subprocess
          import sys
          from datetime import datetime, timezone

          repo = os.environ["REPO"]
          notes_dir = pathlib.Path(os.environ["NOTES_DIR"])
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          # Match a body up to the next version section, the reference-link block,
          # or EOF — so a first release (where [Unreleased] is the last `##`
          # section) doesn't swallow the trailing link definitions.
          BODY = r"^## \[Unreleased\]\s*\n(.*?)(?=^## \[|^\[[^\]]+\]:|\Z)"

          def autofill(changelog, dir, prev_tag):
              text = changelog.read_text()
              m = re.search(BODY, text, re.M | re.S)
              if not m:
                  sys.exit(f"::error::Could not find '## [Unreleased]' in {changelog}")
              body = m.group(1)
              if any(re.match(r"^-\s+\S", ln) for ln in body.splitlines()):
                  return  # curated bullets present
              tag_ok = bool(prev_tag) and subprocess.run(
                  ["git", "rev-parse", "--verify", prev_tag], capture_output=True
              ).returncode == 0
              cmd = ["git-cliff", "--config", "cliff.toml", "--strip", "all",
                     "--include-path", f"{dir}/**"]
              if tag_ok:
                  cmd.append(f"{prev_tag}..HEAD")
              r = subprocess.run(cmd, capture_output=True, text=True)
              if r.returncode != 0:
                  sys.exit(f"::error::git-cliff failed for {dir}: {r.stderr.strip()}")
              gen = r.stdout.strip()
              if not gen:
                  sys.exit(f"::error::No release-worthy commits for {changelog}. "
                           "Add a manual [Unreleased] entry or commit with a recognised prefix.")
              changelog.write_text(text[: m.start(1)] + gen + "\n\n" + text[m.end(1):])

          def extract_notes(changelog, name):
              text = changelog.read_text()
              m = re.search(BODY, text, re.M | re.S)
              body = (m.group(1) if m else "").strip()
              parts = re.split(r"(?m)(^### .+$)", body)
              out = []
              for i in range(1, len(parts), 2):
                  header, section = parts[i], parts[i + 1] if i + 1 < len(parts) else ""
                  bullets = [ln for ln in section.splitlines() if re.match(r"^-\s+\S", ln)]
                  if bullets:
                      if out:
                          out.append("")
                      out.append(header)
                      out.extend(bullets)
              result = "\n".join(out).strip()
              if not result:
                  sys.exit(f"::error::[Unreleased] in {changelog} is empty. Add release notes before releasing.")
              (notes_dir / f"{name}-notes.md").write_text(result + "\n")
              return result

          def promote(changelog, name, version, prev_tag):
              text = changelog.read_text()
              tag = f"{name}-v{version}"
              new_unreleased = (
                  "## [Unreleased]\n\n"
                  "### Added\n-\n\n"
                  "### Changed\n-\n\n"
                  "### Fixed\n-\n\n"
                  f"## [{version}] - {date}"
              )
              text, n = re.subn(r"^## \[Unreleased\]$", new_unreleased, text, count=1, flags=re.M)
              if n != 1:
                  sys.exit(f"::error::Could not find '## [Unreleased]' header in {changelog}")
              if prev_tag:
                  version_link = f"[{version}]: {repo}/compare/{prev_tag}...{tag}"
              else:
                  version_link = f"[{version}]: {repo}/releases/tag/{tag}"
              link = f"[Unreleased]: {repo}/compare/{tag}...HEAD\n{version_link}"
              text, n = re.subn(r"^\[Unreleased\]:.*$", link, text, count=1, flags=re.M)
              if n != 1:
                  sys.exit(f"::error::Could not find '[Unreleased]: ...' link in {changelog}")
              changelog.write_text(text)

          for line in pathlib.Path(os.environ["PLAN"]).read_text().splitlines():
              name, dir, version, prev = (line.split("\t") + ["", "", "", ""])[:4]
              changelog = pathlib.Path(dir) / "CHANGELOG.md"
              autofill(changelog, dir, prev)
              notes = extract_notes(changelog, name)
              promote(changelog, name, version, prev)
              print(f"----- {name} v{version} notes -----\n{notes}\n------------------------------")
          PY

      # One commit for the whole release (all bumped manifests + changelogs + lock),
      # held locally until after publish so the tags point at it.
      - name: Commit version bumps + changelogs
        shell: bash
        env:
          PLAN: ${{ runner.temp }}/plan.tsv
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          msg="Release:"
          while IFS=$'\t' read -r name dir version prev; do
            git add "$dir/Cargo.toml" "$dir/CHANGELOG.md"
            msg="${msg} ${name} v${version},"
          done < "$PLAN"
          # `cargo set-version` auto-widens every in-workspace DEPENDENT's version
          # requirement when a crate crosses a minor/major boundary (e.g. bumping
          # vcs-core 0.2->0.3 rewrites crates/watch + crates/mcp `version = "0.2"`
          # -> "0.3") and regenerates Cargo.lock to match. The per-crate adds above
          # only stage the PLANNED crates, so on a solo minor/major release those
          # rewritten dependent manifests would be left unstaged — committing a lock
          # that pins the new version while the committed manifests still require the
          # old one, breaking every later `--locked` build on main. Stage ALL
          # workspace manifests so the auto-widening lands with the lock (root
          # Cargo.toml is untouched by set-version; staging it would be harmless).
          git add crates/*/Cargo.toml
          git commit -m "${msg%,}"

      # SemVer GATE — refuse a release whose chosen bump is too small for the API
      # change, BEFORE anything is uploaded. For each planned crate that already
      # has a prior release (a `<crate>-v*` tag == a crates.io baseline), run
      # cargo-semver-checks (under the pinned nightly, for rustdoc JSON) comparing the release
      # commit against that tag's code. cargo-semver-checks is version-aware — for
      # a 0.x crate a breaking change requires a MINOR bump, an addition a PATCH —
      # so its summary names the minimum required bump; we compare that to the
      # chosen bump (scripts/release/lib.sh) and abort if it is insufficient,
      # reporting the minimum acceptable bump. Crates with no baseline (a first
      # release) are skipped, exactly as CI's report-only semver job skips them.
      # We read the tool's VERDICT rather than trust its exit code: it exits
      # non-zero precisely when the manifest bump is too small (the case we gate),
      # so we capture its report either way and decide ourselves.
      - name: SemVer gate (min legal bump)
        shell: bash
        env:
          PLAN: ${{ runner.temp }}/plan.tsv
          BUMP: ${{ inputs.bump }}
        run: |
          set -uo pipefail
          source scripts/release/lib.sh
          fail=0
          while IFS=$'\t' read -r name dir version prev; do
            if [ -z "$prev" ]; then
              echo "semver: skip $name (first release — no published baseline)"
              continue
            fi
            echo "::group::semver-checks $name (baseline $prev, planned bump $BUMP)"
            out="$(cargo +nightly-2026-06-15 semver-checks check-release \
                     --package "$name" --baseline-rev "$prev" 2>&1)" || true
            printf '%s\n' "$out"
            echo "::endgroup::"
            required="$(required_bump_from_summary "$out")"
            if [ "$required" = "unknown" ]; then
              echo "::error::semver-checks produced no verdict for $name (a build or baseline error is shown above). Refusing to release blind — fix the tooling/baseline and re-run."
              fail=1
              continue
            fi
            if bump_sufficient "$BUMP" "$required"; then
              echo "semver: $name OK — planned '$BUMP' bump covers the required '$required'."
            else
              echo "::error::$name: a '$BUMP' bump is NOT enough for this API change — the minimum legal bump is '$required'. Re-run the release with bump='$required' (or larger)."
              fail=1
            fi
          done < "$PLAN"
          if [ "$fail" -ne 0 ]; then
            echo "::error::SemVer gate failed — nothing was published. Choose a sufficient bump and re-run."
            exit 1
          fi

      # Gate: PACKAGE each crate exactly as `cargo publish` assembles it — produce
      # the real `.crate` (the packaged file set) and the publish-shaped manifest,
      # then verify-BUILD each from that tarball — all WITHOUT uploading. This
      # replaces the old `cargo build` fallback, which never exercised the packaged
      # file set or metadata for the nine crates with in-workspace deps, so a
      # missing file, bad metadata, or an unresolvable path->version dependency
      # only surfaced at the irreversible `cargo publish`.
      #
      # The planned crate(s) PLUS the in-run/unpublished part of their in-workspace
      # dependency graph are packaged in ONE `cargo package` invocation
      # (verify_package_specs, from scripts/release/lib.sh): cargo builds a
      # temporary registry from the just-packaged siblings and resolves each
      # crate's in-run/unpublished internal deps from it, while an ALREADY-PUBLISHED
      # dependency is left out so it resolves from crates.io at its real published
      # version — exactly what a real `cargo publish` would resolve. So even an
      # `all` release with unpublished internal deps gets a real registry-resolving
      # verify before the first `cargo publish`. `--locked` asserts Cargo.lock
      # matches the just-bumped manifests; the tree is clean here (the bump commit
      # already landed) so no `--allow-dirty` is needed.
      - name: Verify crates package (registry-resolving)
        shell: bash
        env:
          PLAN: ${{ runner.temp }}/plan.tsv
        run: |
          set -euo pipefail
          source scripts/release/lib.sh
          planned=""
          while IFS=$'\t' read -r name dir version prev; do
            planned="$planned $name"
          done < "$PLAN"
          # Which crates already have a crates.io release (a `<crate>-v*` tag) —
          # the same tag-presence convention the plan step uses to detect a first
          # release. verify_package_specs leaves these out of the package set so
          # they resolve from crates.io, and packages the rest locally.
          published=""
          for name in $(release_order); do
            if git tag --list "${name}-v*" | grep -q .; then
              published="$published $name"
            fi
          done
          specs="$(verify_package_specs "$planned" "$published")"
          echo "cargo package $specs --locked"
          # shellcheck disable=SC2086 # deliberate word-split of the `-p ...` flags
          cargo package $specs --locked

      # Publish FIRST — before tags/push/Releases. crates.io is the only
      # irreversible step, so publishing before anything is pushed means a failed
      # publish strands no tag: just re-run. Retry transient errors; an
      # "already uploaded" result (a prior run that published but failed before
      # tagging) counts as success.
      - name: Publish to crates.io
        shell: bash
        env:
          PLAN: ${{ runner.temp }}/plan.tsv
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -uo pipefail
          while IFS=$'\t' read -r name dir version prev; do
            attempt=0; max=3
            while :; do
              attempt=$((attempt + 1))
              if out="$(cargo publish -p "$name" --locked 2>&1)"; then
                printf '%s\n' "$out"; break
              fi
              printf '%s\n' "$out"
              if printf '%s' "$out" | grep -qiE 'crate version .* is already uploaded|already exists on [^[:space:]]*crates\.io index'; then
                echo "::notice::${name} v${version} already on crates.io — treating as published."
                break
              fi
              if [ "$attempt" -ge "$max" ]; then
                echo "::error::cargo publish for ${name} failed after ${max} attempts."
                exit 1
              fi
              echo "::warning::publish ${name} attempt ${attempt} failed; retrying in 30s..."
              sleep 30
            done
          done < "$PLAN"

      # Only after every crate is live: create each `<crate>-v<version>` tag and
      # push the commit + all tags atomically (if any ref is rejected, none land),
      # so the branch can't advance while a tag is dropped (which would make the
      # next run bump from an already-bumped version). checkout@v5 detaches HEAD,
      # so the branch is named explicitly.
      - name: Tag and push
        shell: bash
        env:
          PLAN: ${{ runner.temp }}/plan.tsv
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          refs=("HEAD:refs/heads/${BRANCH}")
          while IFS=$'\t' read -r name dir version prev; do
            git tag "${name}-v${version}"
            refs+=("refs/tags/${name}-v${version}")
          done < "$PLAN"
          git push --atomic origin "${refs[@]}"

      # Tags exist now: attach a GitHub Release to each, with that crate's curated
      # notes. Idempotent (edit if a prior attempt created it) and retried. If a
      # Release still fails, the crate is PUBLISHED and tagged — finish that one by
      # hand; do NOT re-run (a re-run bumps to the next version and strands these).
      - name: Publish GitHub Releases
        shell: bash
        env:
          PLAN: ${{ runner.temp }}/plan.tsv
          NOTES_DIR: ${{ runner.temp }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          while IFS=$'\t' read -r name dir version prev; do
            tag="${name}-v${version}"
            notes="${NOTES_DIR}/${name}-notes.md"
            attempt=0; max=3
            while :; do
              attempt=$((attempt + 1))
              if gh release view "$tag" >/dev/null 2>&1; then
                gh release edit "$tag" --title "$tag" --notes-file "$notes" && break
              else
                gh release create "$tag" --title "$tag" --notes-file "$notes" && break
              fi
              if [ "$attempt" -ge "$max" ]; then
                echo "::error::${tag} is published + tagged, but creating its GitHub Release failed. Finish by hand: gh release create ${tag} --notes-file <notes>. Do NOT re-run the workflow."
                exit 1
              fi
              echo "::warning::Release ${tag} attempt ${attempt} failed; retrying in 15s..."
              sleep 15
            done
          done < "$PLAN"
