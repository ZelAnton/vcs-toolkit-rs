[package]
name = "vcs-forge"
version = "0.1.0"
description = "A backend-agnostic facade over the GitHub/GitLab/Gitea CLI wrappers (gh/glab/tea)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"
keywords = ["forge","github","gitlab","gitea","pull-request"]
categories = ["command-line-utilities","api-bindings"]

[dependencies]
# The `ProcessRunner` seam (so a fake runner can drive the wrapped clients in
# tests) and the structured `Error` the wrappers return.
processkit.workspace = true
# The transient-fetch-error classifier reused by the facade `Error`.
vcs-cli-support = { path = "../cli-support", version = "0.1" }
# The three forge wrappers this facade dispatches across.
vcs-github = { path = "../github", version = "0.5" }
vcs-gitlab = { path = "../gitlab", version = "0.1" }
vcs-gitea = { path = "../gitea", version = "0.1" }
# `async fn` in the object-safe `ForgeApi` trait (dyn-friendly).
async-trait = "0.1"
# Optional: derive `Serialize` on the unified DTOs behind the `serde` feature
# (off by default). Turned on by JSON consumers such as `vcs-mcp`.
serde = { version = "1", features = ["derive"], optional = true }

[features]
# Emit a `tracing` event per command run (forwards to each wrapper's `tracing`).
tracing = ["vcs-github/tracing", "vcs-gitlab/tracing", "vcs-gitea/tracing"]
# Add `#[derive(Serialize)]` to the unified DTOs (`ForgePr`, `ForgeRepo`, â€¦).
serde = ["dep:serde"]
# Forward to each wrapper's `cancellation`, so a consumer can build a cancellable
# `GitHub`/`GitLab`/`Gitea` (via `default_cancel_on`) and pass it to
# `Forge::for_github`/â€¦ â€” cancelling a long `run_watch`/fetch. Off by default.
cancellation = ["vcs-github/cancellation", "vcs-gitlab/cancellation", "vcs-gitea/cancellation"]

[dev-dependencies]
# `#[tokio::test]` for the async dispatch tests.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
# Exercise the `serde` feature's derives (used only by the feature-gated test).
serde_json = "1"
# Property-based fuzzing of the pure mappers (`from_remote_url` panic-freedom +
# lookalike rejection, PR-state mapping). Stable Rust, dev-only.
proptest = "1"

[package.metadata.docs.rs]
# Build docs.rs with every feature so the optional surfaces (mock / tracing /
# cancellation / serde / stream) are documented (defaults alone hide them), and pass
# `--cfg docsrs` so feature-gated items render an "Available on feature `x`" badge.
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true
